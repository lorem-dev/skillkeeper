# Release: build and package the Tauri desktop app on all three platforms
# (per-arch where the toolchain allows), then publish a GitHub release with
# CHANGES.md-derived notes on a v* tag push.
#
# Bundle targets (dmg, app, deb, appimage, nsis, msi) are declared in
# apps/desktop/src-tauri/tauri.conf.json. This workflow drives `tauri build`
# via tauri-apps/tauri-action; target configuration lives in tauri.conf.json.
#
# Signing secrets expected in the repository / environment:
#   macOS (tauri-action variable names):
#     APPLE_CERTIFICATE          - base64-encoded .p12 signing certificate
#     APPLE_CERTIFICATE_PASSWORD - password for the .p12
#     APPLE_SIGNING_IDENTITY     - e.g. "Developer ID Application: Lorem Dev (TEAMID)"
#     APPLE_ID                   - Apple account email (notarization)
#     APPLE_PASSWORD             - app-specific password (notarization)
#     APPLE_TEAM_ID              - Apple Developer team id (notarization)
#   Windows (Authenticode, consumed by the Tauri bundler / import step):
#     WINDOWS_CERTIFICATE          - base64-encoded .pfx
#     WINDOWS_CERTIFICATE_PASSWORD - password for the .pfx
#
# When a signing secret is absent GitHub passes an empty string; tauri-action
# then builds unsigned rather than failing, so the workflow stays green-able.

name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  # ---------------------------------------------------------------------------
  # Guard: the pushed tag must match every package.json, tauri.conf.json, and
  # Cargo workspace version. Fails the whole release early on a mismatch.
  # ---------------------------------------------------------------------------
  verify-version:
    name: Verify tag matches version
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          # This job only runs node scripts/check-version.mjs and never installs
          # deps. Disable setup-node's package-manager cache: it otherwise
          # auto-detects the pnpm packageManager field and fails locating pnpm
          # before corepack is enabled.
          package-manager-cache: false

      - name: Check the tag matches every package, tauri, and crate version
        run: node scripts/check-version.mjs

  # ---------------------------------------------------------------------------
  # Build: one matrix leg per (os, target). macOS covers both arches via cross
  # targets on the arm64 runner. Linux arm64 and Windows arm64 can be added as
  # further legs once cross-toolchains / arm runners are wired (see NOTE below).
  # ---------------------------------------------------------------------------
  build:
    name: Build ${{ matrix.target }}
    needs: verify-version
    runs-on: ${{ matrix.os }}

    env:
      # Sign only when a certificate secret is actually configured; GitHub
      # passes "" for a missing secret. These flags gate the signing steps so
      # the build stays green-able and simply produces unsigned artifacts.
      HAS_WIN_CERT: ${{ secrets.WINDOWS_CERTIFICATE != '' }}
      HAS_APPLE_CERT: ${{ secrets.APPLE_CERTIFICATE != '' }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon
          - os: macos-latest
            target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
          # macOS Intel (cross-compiled on the arm64 runner)
          - os: macos-latest
            target: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin"
          # Linux x64. ubuntu-22.04 keeps the AppImage's glibc floor low for
          # broader distro compatibility.
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ""
          # Windows x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            args: ""
          # NOTE: per-arch left as documented best-effort:
          #   - Linux arm64 (aarch64-unknown-linux-gnu) needs a cross toolchain
          #     or an arm64 runner and the arm64 webkit dev packages.
          #   - Windows arm64 (aarch64-pc-windows-msvc) needs the arm64 MSVC
          #     target; MakeAppx would also need ProcessorArchitecture="arm64".

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          # The desktop build needs real binary assets (LFS-tracked fonts and
          # icon source PNGs), not LFS pointer files.
          lfs: true

      # Tauri v2 links the system WebKitGTK/libsoup stack on Linux; these
      # packages are required for `tauri build` to compile the app crate.
      - name: Install Tauri Linux system dependencies
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
          workspaces: "apps/desktop/src-tauri -> target"

      - name: Enable pnpm via corepack
        run: corepack enable

      - name: Set up Node.js 22 with pnpm cache
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      # The Tauri frontend (dist-tauri) imports the workspace libs; build them
      # before `tauri build` runs beforeBuildCommand.
      - name: Build libraries
        run: pnpm build:libs

      # The git-ignored icon set is generated from assets/icons/. build.rs
      # regenerates it when missing, but a warm rust-cache skips build.rs while
      # the icons (not cached, not committed) are absent -- so generate them
      # explicitly here before `tauri build` compiles/bundles the app.
      - name: Generate the desktop icon set
        run: pnpm run icons

      # Import the Windows Authenticode certificate so the Tauri bundler can
      # sign the nsis/msi when bundle.windows.certificateThumbprint is set in
      # tauri.conf.json. Gated on HAS_WIN_CERT so it no-ops (unsigned) when the
      # secret is unset, keeping the build green-able.
      - name: Import Windows signing certificate
        if: matrix.os == 'windows-latest' && env.HAS_WIN_CERT == 'true'
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $pfxPath = Join-Path $env:RUNNER_TEMP "windows-cert.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE))
          $pwd = ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
          Import-PfxCertificate -FilePath $pfxPath -CertStoreLocation Cert:\CurrentUser\My -Password $pwd

      # The msi bundle target requires a numeric ProductVersion, but the app
      # version carries a non-numeric pre-release (e.g. 0.1.0-rc.2). Derive an
      # MSI-only version into bundle.windows.wix.version so the msi target
      # bundles; every other target keeps the app version. Runs only on the
      # Windows leg and only mutates the ephemeral runner's checkout.
      - name: Set MSI (wix) version
        if: matrix.os == 'windows-latest'
        shell: bash
        run: node scripts/set-wix-version.mjs

      # tauri-bundler attempts a keychain certificate import whenever
      # APPLE_CERTIFICATE is present in the environment -- even when empty --
      # which fails the macOS bundle. Export the Apple signing variables only
      # when a certificate secret is actually configured, so an unset secret
      # yields an unsigned (green-able) build instead of a failed import.
      - name: Configure Apple code signing
        if: startsWith(matrix.os, 'macos') && env.HAS_APPLE_CERT == 'true'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          {
            echo "APPLE_CERTIFICATE=$APPLE_CERTIFICATE"
            echo "APPLE_CERTIFICATE_PASSWORD=$APPLE_CERTIFICATE_PASSWORD"
            echo "APPLE_SIGNING_IDENTITY=$APPLE_SIGNING_IDENTITY"
            echo "APPLE_ID=$APPLE_ID"
            echo "APPLE_PASSWORD=$APPLE_PASSWORD"
            echo "APPLE_TEAM_ID=$APPLE_TEAM_ID"
          } >> "$GITHUB_ENV"

      - name: Build the app (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          # macOS signing is injected via $GITHUB_ENV by "Configure Apple code
          # signing" above, and only when a certificate secret is set. The
          # Windows cert password is harmless when empty (no thumbprint set in
          # tauri.conf.json means the bundler does not sign).
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        with:
          # The Tauri project lives under apps/desktop (src-tauri inside it).
          projectPath: apps/desktop
          # Build only; the dedicated publish job creates the GitHub release
          # with the CHANGES.md-derived notes. Per-arch selection via --target.
          args: ${{ matrix.args }}

      # -----------------------------------------------------------------------
      # Windows MSIX (MakeAppx): package the built exe + tile assets into an
      # MSIX using the appx identity dev.lorem.SkillKeeper / CN=Lorem Dev.
      # Best-effort: authored manifest + MakeAppx pack; unsigned (Store signs
      # on ingest). Does not fail the build if MakeAppx/exe are unavailable.
      # -----------------------------------------------------------------------
      - name: Package Windows MSIX (MakeAppx)
        if: matrix.os == 'windows-latest'
        continue-on-error: true
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          # 4-part numeric version required by MSIX (no prerelease suffix).
          $conf = Get-Content "apps/desktop/src-tauri/tauri.conf.json" | ConvertFrom-Json
          $semver = $conf.version -replace '-.*$', ''
          $parts = $semver.Split('.')
          $msixVersion = "{0}.{1}.{2}.0" -f $parts[0], $parts[1], $parts[2]
          Write-Host "MSIX version: $msixVersion"

          # Locate the built executable (target name = crate name skillkeeper).
          $exe = Get-ChildItem -Path "apps/desktop/src-tauri/target" -Recurse -Filter "skillkeeper.exe" |
            Where-Object { $_.FullName -match "release" -and $_.FullName -notmatch "deps" } |
            Select-Object -First 1
          if (-not $exe) {
            Write-Warning "skillkeeper.exe not found; skipping MSIX packaging."
            exit 0
          }

          $stage = Join-Path $env:RUNNER_TEMP "msix"
          $assets = Join-Path $stage "Assets"
          New-Item -ItemType Directory -Force -Path $assets | Out-Null
          Copy-Item $exe.FullName (Join-Path $stage "skillkeeper.exe") -Force

          # Tile assets from the Tauri icons dir (Square* + StoreLogo).
          $iconDir = "apps/desktop/src-tauri/icons"
          foreach ($name in @(
            "StoreLogo.png",
            "Square30x30Logo.png", "Square44x44Logo.png", "Square71x71Logo.png",
            "Square89x89Logo.png", "Square107x107Logo.png", "Square142x142Logo.png",
            "Square150x150Logo.png", "Square284x284Logo.png", "Square310x310Logo.png"
          )) {
            $src = Join-Path $iconDir $name
            if (Test-Path $src) { Copy-Item $src (Join-Path $assets $name) -Force }
          }

          # AppxManifest.xml. Identity dev.lorem.SkillKeeper / CN=Lorem Dev,
          # tile background #1e40af, full-trust desktop app. Built as an array
          # (avoids here-string terminator conflicts inside YAML).
          $manifest = @(
            '<?xml version="1.0" encoding="utf-8"?>',
            '<Package',
            '  xmlns="http://schemas.microsoft.com/appx/manifest/foundation/windows10"',
            '  xmlns:uap="http://schemas.microsoft.com/appx/manifest/uap/windows10"',
            '  xmlns:rescap="http://schemas.microsoft.com/appx/manifest/foundation/windows10/restrictedcapabilities"',
            '  IgnorableNamespaces="uap rescap">',
            '  <Identity Name="dev.lorem.SkillKeeper"',
            '            Publisher="CN=Lorem Dev"',
            ('            Version="' + $msixVersion + '"'),
            '            ProcessorArchitecture="x64" />',
            '  <Properties>',
            '    <DisplayName>SkillKeeper</DisplayName>',
            '    <PublisherDisplayName>Lorem Dev</PublisherDisplayName>',
            '    <Logo>Assets\StoreLogo.png</Logo>',
            '  </Properties>',
            '  <Dependencies>',
            '    <TargetDeviceFamily Name="Windows.Desktop" MinVersion="10.0.17763.0" MaxVersionTested="10.0.22621.0" />',
            '  </Dependencies>',
            '  <Resources>',
            '    <Resource Language="en-us" />',
            '  </Resources>',
            '  <Applications>',
            '    <Application Id="SkillKeeper" Executable="skillkeeper.exe" EntryPoint="Windows.FullTrustApplication">',
            '      <uap:VisualElements',
            '        DisplayName="SkillKeeper"',
            '        Description="Install and manage skills and hooks for AI coding agents"',
            '        BackgroundColor="#1e40af"',
            '        Square150x150Logo="Assets\Square150x150Logo.png"',
            '        Square44x44Logo="Assets\Square44x44Logo.png">',
            '        <uap:DefaultTile',
            '          Square71x71Logo="Assets\Square71x71Logo.png"',
            '          Square310x310Logo="Assets\Square310x310Logo.png">',
            '          <uap:ShowNameOnTiles>',
            '            <uap:ShowOn Tile="square150x150Logo" />',
            '          </uap:ShowNameOnTiles>',
            '        </uap:DefaultTile>',
            '      </uap:VisualElements>',
            '    </Application>',
            '  </Applications>',
            '  <Capabilities>',
            '    <rescap:Capability Name="runFullTrust" />',
            '  </Capabilities>',
            '</Package>'
          ) -join "`r`n"
          Set-Content -Path (Join-Path $stage "AppxManifest.xml") -Value $manifest -Encoding UTF8

          # Locate MakeAppx.exe from the installed Windows SDK.
          $makeappx = Get-ChildItem -Path "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Recurse -Filter "makeappx.exe" -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match "x64" } |
            Sort-Object FullName -Descending | Select-Object -First 1
          if (-not $makeappx) {
            Write-Warning "makeappx.exe not found; skipping MSIX packaging."
            exit 0
          }

          $outDir = "apps/desktop/dist-msix"
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null
          $msix = Join-Path $outDir "SkillKeeper-$msixVersion.msix"
          & $makeappx.FullName pack /d $stage /p $msix /o
          Write-Host "Built MSIX: $msix"

      # -----------------------------------------------------------------------
      # Upload per-target bundles + the MSIX. Covers both the default target
      # dir (linux/windows) and the cross-target dir (macOS --target).
      # -----------------------------------------------------------------------
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: skillkeeper-${{ github.ref_name }}-${{ matrix.target }}
          path: |
            apps/desktop/src-tauri/target/release/bundle/**/*
            apps/desktop/src-tauri/target/*/release/bundle/**/*
            apps/desktop/dist-msix/*.msix
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Publish: after all matrix builds succeed, create the GitHub release with
  # notes extracted from CHANGES.md and attach every built artifact.
  # ---------------------------------------------------------------------------
  publish:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    # Creating a GitHub release requires write access to repo contents; the
    # default GITHUB_TOKEN is read-only, which fails with a 403.
    permissions:
      contents: write

    # Sign checksums.txt only when the release GPG key is configured; GitHub
    # passes "" for a missing secret. Gating keeps the release green-able
    # (unsigned) before the secret is set, matching how the macOS/Windows
    # signing steps degrade to unsigned artifacts.
    env:
      HAS_GPG: ${{ secrets.SKILLKEEPER_RELEASE_GPG_KEY != '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          # This job runs only node scripts (release notes) plus gh/gpg and
          # never installs deps. Disable the package-manager cache so setup-node
          # does not try to locate pnpm before corepack is enabled.
          package-manager-cache: false

      - name: Generate release notes from CHANGES.md
        run: node scripts/release-notes.mjs

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-all

      # Flatten every built artifact into a single dist/ directory. The upload
      # action names each release asset by basename, so a duplicate basename
      # across targets would silently clobber an asset -- fail loudly instead.
      - name: Stage release assets
        run: |
          mkdir -p dist
          while IFS= read -r -d '' f; do
            base="$(basename "$f")"
            if [ -e "dist/$base" ]; then
              echo "::error::Duplicate release asset basename: $base"
              exit 1
            fi
            cp "$f" "dist/$base"
          done < <(find dist-all -type f)
          echo "Staged $(find dist -type f | wc -l) files:"
          ls -1 dist

      # Checksum every staged asset. Written outside dist/ first so the glob
      # cannot include the (empty) checksums.txt the redirection would create.
      - name: Generate SHA-256 checksums
        run: |
          ( cd dist && sha256sum * ) > checksums.txt
          mv checksums.txt dist/checksums.txt
          cat dist/checksums.txt

      - name: Import GPG release key
        if: env.HAS_GPG == 'true'
        env:
          GPG_PRIVATE_KEY: ${{ secrets.SKILLKEEPER_RELEASE_GPG_KEY }}
        run: |
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
          printf '%s' "$GPG_PRIVATE_KEY" | gpg --batch --import

      - name: Sign checksums
        if: env.HAS_GPG == 'true'
        env:
          GPG_PASSPHRASE: ${{ secrets.SKILLKEEPER_RELEASE_GPG_PASSPHRASE }}
        working-directory: dist
        run: |
          gpg --batch --yes --pinentry-mode loopback \
              --passphrase "$GPG_PASSPHRASE" \
              --detach-sign --armor \
              --output checksums.txt.asc \
              checksums.txt

      - name: Warn when the release is unsigned
        if: env.HAS_GPG != 'true'
        run: echo "::warning::SKILLKEEPER_RELEASE_GPG_KEY is not set; publishing checksums.txt without a GPG signature."

      - name: Create GitHub release and attach artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body_path: RELEASE_NOTES.md
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
