<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SkillKeeper</title>
    <style>
      /*
       * Hardcoded startup preloader. Intentionally text-free (any label would
       * need localization, which is not available before the bundle loads).
       *
       * Theme follows `prefers-color-scheme`: the Rust backend applies
       * `config.general.theme` to the window before it loads, so this matches
       * the app's chosen theme (system/light/dark). The
       * app itself is revealed by app/preloader.ts once initial data is loaded.
       */
      :root {
        --sk-preloader-bg: #f2f2f7; /* --sk-color-bg-secondary, light */
        --sk-preloader-ink: 0, 0, 0;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --sk-preloader-bg: #1c1c1e; /* --sk-color-bg-secondary, dark */
          --sk-preloader-ink: 255, 255, 255;
        }
      }

      html,
      body {
        margin: 0;
        height: 100vh;
      }
      body {
        background: var(--sk-preloader-bg);
      }

      #sk-preloader {
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--sk-preloader-bg);
      }

      /*
       * The spinner starts invisible and only fades in after 100ms, so a fast
       * init shows just the themed background (no spinner flash). The whole SVG
       * rotates in 12 discrete steps -- the graded per-spoke opacity then reads
       * as a chasing highlight (the classic macOS activity indicator).
       */
      .sk-preloader__spinner {
        width: 28px;
        height: 28px;
        opacity: 0;
        transform-origin: 50% 50%;
        animation:
          sk-preloader-spin 1s steps(12, end) infinite,
          sk-preloader-appear 200ms ease 100ms forwards;
      }
      .sk-preloader__spoke {
        fill: rgb(var(--sk-preloader-ink));
      }

      @keyframes sk-preloader-spin {
        to {
          transform: rotate(360deg);
        }
      }
      @keyframes sk-preloader-appear {
        to {
          opacity: 1;
        }
      }

      /* Respect the OS reduced-motion setting: show static spokes, no spin. */
      @media (prefers-reduced-motion: reduce) {
        .sk-preloader__spinner {
          animation: sk-preloader-appear 200ms ease 100ms forwards;
        }
      }
    </style>
  </head>
  <body>
    <div id="sk-preloader" aria-hidden="true">
      <svg class="sk-preloader__spinner" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <rect class="sk-preloader__spoke" x="45.5" y="6" width="9" height="24" rx="4.5" transform="rotate(0 50 50)" opacity="1" />
        <rect class="sk-preloader__spoke" x="45.5" y="6" width="9" height="24" rx="4.5" transform="rotate(30 50 50)" opacity="0.92" />
        <rect class="sk-preloader__spoke" x="45.5" y="6" width="9" height="24" rx="4.5" transform="rotate(60 50 50)" opacity="0.85" />
        <rect class="sk-preloader__spoke" x="45.5" y="6" width="9" height="24" rx="4.5" transform="rotate(90 50 50)" opacity="0.77" />
        <rect class="sk-preloader__spoke" x="45.5" y="6" width="9" height="24" rx="4.5" transform="rotate(120 50 50)" opacity="0.69" />
        <rect class="sk-preloader__spoke" x="45.5" y="6" width="9" height="24" rx="4.5" transform="rotate(150 50 50)" opacity="0.61" />
        <rect class="sk-preloader__spoke" x="45.5" y="6" width="9" height="24" rx="4.5" transform="rotate(180 50 50)" opacity="0.54" />
        <rect class="sk-preloader__spoke" x="45.5" y="6" width="9" height="24" rx="4.5" transform="rotate(210 50 50)" opacity="0.46" />
        <rect class="sk-preloader__spoke" x="45.5" y="6" width="9" height="24" rx="4.5" transform="rotate(240 50 50)" opacity="0.38" />
        <rect class="sk-preloader__spoke" x="45.5" y="6" width="9" height="24" rx="4.5" transform="rotate(270 50 50)" opacity="0.31" />
        <rect class="sk-preloader__spoke" x="45.5" y="6" width="9" height="24" rx="4.5" transform="rotate(300 50 50)" opacity="0.23" />
        <rect class="sk-preloader__spoke" x="45.5" y="6" width="9" height="24" rx="4.5" transform="rotate(330 50 50)" opacity="0.15" />
      </svg>
    </div>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
